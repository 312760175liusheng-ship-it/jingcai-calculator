<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐饮工具箱 · 总入口</title>
<style>
  :root{ --bg:#f5f5f0; --card:#fff; --line:#e3e1d8; --text:#2c2c2a; --muted:#76746c; --accent:#1d9e75; --accentbg:#e1f5ee; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; line-height:1.6; padding:18px; }
  .wrap{ max-width:640px; margin:0 auto; }
  h1{ font-size:22px; font-weight:600; margin:6px 0 4px; }
  .sub{ color:var(--muted); font-size:14px; margin:0 0 20px; }
  a.tool{ display:block; text-decoration:none; color:inherit; background:var(--card);
    border:1px solid var(--line); border-radius:12px; padding:15px 17px; margin-bottom:13px; transition:.15s; }
  a.tool:hover{ border-color:var(--accent); background:var(--accentbg); }
  .tool .name{ font-size:17px; font-weight:600; margin:0 0 3px; }
  .tool .name .em{ font-size:18px; margin-right:7px; }
  .tool .desc{ font-size:13.5px; color:var(--muted); margin:0; }
  .tool .go{ float:right; color:var(--accent); font-size:13px; margin-top:2px; }
  .foot{ color:var(--muted); font-size:12px; margin-top:18px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🍽️ 餐饮工具箱</h1>
  <p class="sub">郝哥快餐店 · AI 网络销售实战的随身工具，手机电脑都能用、能转发。</p>

  <a class="tool" href="./">
    <span class="go">打开 →</span>
    <p class="name"><span class="em">📊</span>利润计算器</p>
    <p class="desc">这门生意赚不赚：拖滑块算保本单量、回本周期、各自分多少。</p>
  </a>

  <a class="tool" href="./prep.html">
    <span class="go">打开 →</span>
    <p class="name"><span class="em">📋</span>筹备期作战台</p>
    <p class="desc">开店筹备清单（带产出物）+ 竞品情报表，勾选填写自动存档。</p>
  </a>

  <a class="tool" href="./waimai/">
    <span class="go">打开 →</span>
    <p class="name"><span class="em">🛵</span>外卖满减计算器</p>
    <p class="desc">一单算明白：满减/活动定价不亏，外卖运营直接用。</p>
  </a>

  <a class="tool" href="./kuaichao/">
    <span class="go">打开 →</span>
    <p class="name"><span class="em">🔍</span>实地调查表</p>
    <p class="desc">用顾客/加盟商视角，从外部摸竞品和市场的真账。</p>
  </a>

  <p class="foot">母本：~/Developer/jingcai-calculator ｜ 改了跟 Claude 说一声推一下，链接不变</p>
</div>
</body>
</html>
